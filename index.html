<!DOCTYPE html>
<html lang="kk">
<head>
<meta charset="UTF-8">

<meta
  name="viewport"
  content="width=device-width, initial-scale=1.0"
>

<title>
  Сыни және аналитикалық ойлау
</title>

<style>
* {
  box-sizing: border-box;
}

:root {
  --primary: #2563eb;
  --primary-dark: #1e40af;
  --primary-light: #dbeafe;

  --background: #f3f6fb;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #667085;
  --border: #d7deea;

  --correct: #15803d;
  --correct-background: #dcfce7;

  --wrong: #b91c1c;
  --wrong-background: #fee2e2;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Arial,
    sans-serif;
  background: var(--background);
  color: var(--text);
  line-height: 1.55;
}

header {
  padding: 34px 16px 58px;
  background:
    linear-gradient(
      135deg,
      #1d4ed8,
      #3b82f6
    );
  color: white;
  text-align: center;
}

header h1 {
  margin: 0 0 10px;
  font-size: 34px;
  line-height: 1.2;
}

header p {
  margin: 0;
  font-size: 17px;
  opacity: 0.95;
}

.container {
  width: min(
    960px,
    calc(100% - 24px)
  );
  margin: -32px auto 55px;
}
  .section-navigation {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 16px;
  margin-bottom: 18px;
  background: white;
  border-radius: 17px;
  box-shadow:
    0 5px 20px
    rgba(31, 41, 55, 0.09);
}

.section-button {
  border: 2px solid var(--border);
  border-radius: 13px;
  padding: 16px 12px;
  background: #f8fafc;
  color: #344054;
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
}

.section-button.active {
  border-color: var(--primary);
  background: var(--primary);
  color: white;
}

.section-button.locked {
  opacity: 0.55;
  cursor: not-allowed;
}

.test-section {
  display: none;
}

.test-section.active {
  display: block;
}

.section-header {
  padding: 22px;
  margin-bottom: 15px;
  background: white;
  border-radius: 17px;
  box-shadow:
    0 5px 20px
    rgba(31, 41, 55, 0.08);
}

.section-header h2 {
  margin: 0 0 7px;
  color: var(--primary);
  font-size: 28px;
}

.section-header p {
  margin: 0;
  color: var(--muted);
}

.section-information {
  display: flex;
  flex-wrap: wrap;
  gap: 9px;
  margin-top: 13px;
}

.information-badge {
  display: inline-flex;
  align-items: center;
  padding: 7px 11px;
  border-radius: 999px;
  background: var(--primary-light);
  color: var(--primary-dark);
  font-size: 14px;
  font-weight: 800;
}

.progress-card {
  padding: 16px 18px;
  margin-bottom: 15px;
  background: white;
  border-radius: 15px;
  box-shadow:
    0 4px 18px
    rgba(31, 41, 55, 0.07);
}

.progress-information {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 9px;
  color: var(--muted);
}

.progress-information strong {
  color: var(--primary);
}

.progress-line {
  width: 100%;
  height: 10px;
  overflow: hidden;
  border-radius: 999px;
  background: #dce4f0;
}

.progress-line span {
  display: block;
  width: 0;
  height: 100%;
  border-radius: 999px;
  background: var(--primary);
  transition: width 0.25s;
}

  .question {
  padding: 21px;
  margin-bottom: 15px;
  background: var(--card);
  border: 1px solid #dce3ee;
  border-radius: 16px;
  box-shadow:
    0 4px 17px
    rgba(31, 41, 55, 0.06);
}

.question-number {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 38px;
  height: 35px;
  margin-bottom: 12px;
  padding: 0 11px;
  border-radius: 10px;
  background: var(--primary-light);
  color: var(--primary-dark);
  font-weight: 900;
}

.question-title {
  margin: 0 0 16px;
  font-size: 18px;
  line-height: 1.55;
}

.math {
  font-family:
    "Times New Roman",
    Georgia,
    serif;
  font-size: 21px;
}

.visual-box {
  margin: 5px 0 18px;
  padding: 14px;
  overflow-x: auto;
  border: 1px solid #dce3ee;
  border-radius: 14px;
  background: #ffffff;
  text-align: center;
}

.visual-box svg {
  display: block;
  width: min(100%, 620px);
  height: auto;
  margin: 0 auto;
}

.comparison-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  margin: 5px 0 18px;
  overflow: hidden;
  border: 1.5px solid #475569;
  border-radius: 8px;
}

.comparison-cell {
  min-height: 110px;
  padding: 14px;
  font-family:
    "Times New Roman",
    Georgia,
    serif;
  font-size: 19px;
}

.comparison-cell + .comparison-cell {
  border-left: 1.5px solid #475569;
}

.comparison-title {
  display: block;
  margin-bottom: 9px;
  font-family:
    -apple-system,
    BlinkMacSystemFont,
    "Segoe UI",
    Arial,
    sans-serif;
  font-weight: 900;
}

.options {
  display: grid;
  gap: 9px;
}

.option {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 13px;
  border: 1.5px solid var(--border);
  border-radius: 12px;
  background: white;
  cursor: pointer;
  transition: 0.18s;
}

.option:hover {
  border-color: #93b4f6;
  background: #f8fbff;
}

.option input {
  flex: 0 0 auto;
  margin-top: 4px;
  transform: scale(1.15);
  accent-color: var(--primary);
}

.option-letter {
  flex: 0 0 27px;
  color: #475467;
  font-weight: 900;
}
  .option.correct {
  border-color: #22c55e;
  background: var(--correct-background);
  color: #166534;
}

.option.wrong {
  border-color: #ef4444;
  background: var(--wrong-background);
  color: #991b1b;
}

.explanation {
  display: none;
  margin-top: 17px;
  padding-top: 16px;
  border-top: 1px solid #e4e7ec;
}

.question.checked .explanation {
  display: block;
}

.question-score {
  margin-bottom: 12px;
  padding: 11px 14px;
  border-radius: 10px;
  font-weight: 900;
}

.question-score.full {
  background: var(--correct-background);
  color: #166534;
}

.question-score.zero {
  background: var(--wrong-background);
  color: #991b1b;
}

.correct-answer {
  padding: 12px 14px;
  border-radius: 11px;
  background: var(--correct-background);
  color: #166534;
  font-weight: 800;
}

.explanation-title {
  margin: 14px 0 7px;
  color: var(--primary-dark);
  font-size: 17px;
  font-weight: 900;
}

.explanation-text {
  margin: 0;
  padding: 13px 14px;
  border-radius: 11px;
  background: #f7faff;
}

.key-fact {
  margin-top: 11px;
  padding: 12px 14px;
  border-left: 5px solid var(--primary);
  border-radius: 8px;
  background: var(--primary-light);
  font-weight: 750;
}
  .result-card {
  display: none;
  padding: 24px;
  margin: 18px 0;
  border-radius: 16px;
  background: white;
  text-align: center;
  box-shadow:
    0 4px 18px
    rgba(31, 41, 55, 0.08);
}

.result-card.show {
  display: block;
}

.result-card h3 {
  margin: 0 0 8px;
  color: var(--primary);
}

.score {
  margin: 5px 0;
  color: var(--primary);
  font-size: 39px;
  font-weight: 900;
}

.actions {
  position: sticky;
  bottom: 0;
  z-index: 20;
  display: flex;
  gap: 10px;
  padding: 13px 0 17px;
  background:
    rgba(243, 246, 251, 0.95);
  backdrop-filter: blur(9px);
}

.actions button {
  border: none;
  border-radius: 12px;
  padding: 15px 17px;
  font-size: 16px;
  font-weight: 900;
  cursor: pointer;
}

.show-result-button {
  flex: 1;
  background: var(--primary);
  color: white;
}

.reset-button {
  background: #e5e7eb;
  color: #1f2937;
}

@media (max-width: 650px) {
  header h1 {
    font-size: 27px;
  }

  .section-navigation {
    grid-template-columns: 1fr;
  }

  .question {
    padding: 17px 15px;
  }

  .question-title {
    font-size: 17px;
  }

  .comparison-grid {
    grid-template-columns: 1fr;
  }

  .comparison-cell + .comparison-cell {
    border-top: 1.5px solid #475569;
    border-left: none;
  }

  .actions {
    flex-direction: column-reverse;
  }
}

.solution-steps {
  margin: 0;
  padding-left: 24px;
}

.solution-steps li {
  margin-bottom: 9px;
}

.solution-steps li:last-child {
  margin-bottom: 0;
}

.solution-formula {
  display: block;
  margin-top: 5px;
  font-family: "Times New Roman", Georgia, serif;
  font-size: 19px;
  font-weight: 700;
}

</style>
</head>
<body>

<header>
  <h1>
    Сыни және аналитикалық ойлау
  </h1>

  <p>
    Кешенді тестілеуге дайындық
  </p>
</header>

<main class="container">

  <nav class="section-navigation">

    <button
      type="button"
      id="criticalTab"
      class="section-button active"
    >
      Сыни ойлау
    </button>

    <button
      type="button"
      id="analyticalTab"
      class="section-button locked"
      disabled
    >
      Аналитикалық ойлау
    </button>

  </nav>

  <section
    id="criticalSection"
    class="test-section active"
  >

    <div class="section-header">

      <h2>
        Сыни ойлау
      </h2>

      <p>
        15 сұрақ. Әр сұрақта бір дұрыс жауап бар.
        Әр дұрыс жауапқа 1 балл беріледі.
      </p>

      <div class="section-information">

        <span class="information-badge">
          15 сұрақ
        </span>

        <span class="information-badge">
          Ең жоғары балл: 15
        </span>

      </div>

    </div>

    <div class="progress-card">

      <div class="progress-information">

        <span>
          Жауап беру барысы
        </span>

        <strong id="criticalProgressText">
          0 / 15
        </strong>

      </div>

      <div class="progress-line">
        <span id="criticalProgressBar"></span>
      </div>

    </div>
        <div
      id="criticalResult"
      class="result-card"
    >

      <h3>
        Сыни ойлау нәтижесі
      </h3>

      <div
        id="criticalScore"
        class="score"
      >
        0 / 15
      </div>

    </div>

    <div id="criticalQuiz"></div>

    <div class="actions">

      <button
        type="button"
        class="reset-button"
        onclick="resetCriticalTest()"
      >
        Қайта бастау
      </button>

      <button
        type="button"
        class="show-result-button"
        onclick="showCriticalResults()"
      >
        Нәтижені көрсету
      </button>

    </div>

  </section>

<script>
const letters = [
  "A",
  "B",
  "C",
  "D",
  "E"
];

const criticalQuestions = [
    {
    number: 1,

    question:
      "A және B шамаларын салыстырыңыз.",

    visual: `
      <div class="comparison-grid">

        <div class="comparison-cell">
          <span class="comparison-title">A шамасы</span>

          <svg
            viewBox="0 0 520 310"
            role="img"
            aria-label="m және n параллель түзулері, ABC үшбұрышы, 4x, 3x, 50 градус және y бұрышы"
          >
            <line x1="35" y1="45" x2="485" y2="45"
              stroke="#111827" stroke-width="3"/>
            <line x1="35" y1="235" x2="485" y2="235"
              stroke="#111827" stroke-width="3"/>

            <line x1="150" y1="235" x2="255" y2="45"
              stroke="#111827" stroke-width="3"/>
            <line x1="255" y1="45" x2="350" y2="235"
              stroke="#111827" stroke-width="3"/>

            <path d="M150 235 A34 34 0 0 0 126 204"
              fill="none" stroke="#2563eb" stroke-width="2.5"/>
            <path d="M350 235 A34 34 0 0 1 374 204"
              fill="none" stroke="#2563eb" stroke-width="2.5"/>
            <path d="M255 45 A33 33 0 0 0 225 63"
              fill="none" stroke="#2563eb" stroke-width="2.5"/>
            <path d="M255 45 A44 44 0 0 0 243 87"
              fill="none" stroke="#2563eb" stroke-width="2.5"/>

            <text x="247" y="31" font-size="21" font-weight="700">B</text>
            <text x="140" y="261" font-size="21" font-weight="700">A</text>
            <text x="343" y="261" font-size="21" font-weight="700">C</text>

            <text x="90" y="213" font-size="27">4x</text>
            <text x="374" y="213" font-size="27">3x</text>
            <text x="248" y="113" font-size="27">50°</text>
            <text x="211" y="74" font-size="25">y°</text>

            <text x="491" y="51" font-size="20" font-style="italic">m</text>
            <text x="491" y="241" font-size="20" font-style="italic">n</text>
          </svg>

          <div class="math">
            <i>m</i> және <i>n</i> параллель болса,
            <i>y</i> бұрышының мәні
          </div>
        </div>

        <div class="comparison-cell">
          <span class="comparison-title">B шамасы</span>

          <div class="math" style="font-size:26px; margin-top:45px;">
            <span style="display:inline-block; border-bottom:2px solid #111827; padding:0 8px 4px;">
              7x + 560
            </span>
            <span style="display:block; margin-top:2px;">6</span>
            <span style="display:inline-block; margin-left:120px; margin-top:-48px; vertical-align:top;">
              = 150
            </span>
          </div>

          <div style="margin-top:20px; font-size:20px;">
            Теңдеуінің шешімі
          </div>
        </div>

      </div>
    `,

    options: [
      "B шамасы үлкен",
      "Шамаларды салыстыру мүмкін емес",
      "A = B",
      "A шамасы үлкен"
    ],

    correct: 2,

    explanation:
      `<ol class="solution-steps">
<li><b>1-қадам.</b> Үшбұрыштың A және C төбелеріндегі ішкі бұрыштарды сыртқы бұрыштар арқылы өрнектейміз:
<span class="solution-formula">∠A = 180° − 4x, &nbsp; ∠C = 180° − 3x.</span></li>
<li><b>2-қадам.</b> Үшбұрыш бұрыштарының қосындысы 180°:
<span class="solution-formula">(180° − 4x) + 50° + (180° − 3x) = 180°.</span>
Осыдан <span class="solution-formula">410° − 7x = 180° → 7x = 230° → x = 230/7.</span></li>
<li><b>3-қадам.</b> m ∥ n болғандықтан, y мен 4x — біржақты ішкі бұрыштар:
<span class="solution-formula">y + 4x = 180°.</span>
Сондықтан <span class="solution-formula">y = 180° − 4 · 230/7 = 340/7.</span>
Демек, <b>A шамасы = 340/7</b>.</li>
<li><b>4-қадам.</b> B шамасындағы теңдеуді шешеміз:
<span class="solution-formula">(7x + 560)/6 = 150 → 7x + 560 = 900 → 7x = 340 → x = 340/7.</span></li>
<li><b>5-қадам.</b> Екі шаманы салыстырамыз:
<span class="solution-formula">A = 340/7, &nbsp; B = 340/7.</span>
Сондықтан <b>A = B</b>.</li>
</ol>`,

    keyFact:
      "A = 340/7 және B = 340/7, сондықтан A = B."
  },

  {
    number: 2,

    question:
      "Теңсіздіктің шешімін табыңыз:",

    visual: `
      <div class="visual-box math">
        (√x³ − 6)(√x³ + 6) ≥ 180
      </div>
    `,

    options: [
      "(−6; +∞]",
      "[−6; +∞)",
      "(6; +∞)",
      "[6; +∞)",
      "(−∞; 8)"
    ],

    correct: 3,

    explanation:
      `<ol class="solution-steps">
<li><b>1-қадам.</b> Көбейткіштерді қысқаша көбейту формуласы бойынша ашамыз:
<span class="solution-formula">(a − b)(a + b) = a² − b².</span></li>
<li><b>2-қадам.</b>
<span class="solution-formula">(√x³ − 6)(√x³ + 6) = x³ − 36.</span></li>
<li><b>3-қадам.</b> Теңсіздікті шешеміз:
<span class="solution-formula">x³ − 36 ≥ 180 → x³ ≥ 216 → x ≥ 6.</span></li>
<li><b>4-қадам.</b> 6 саны теңсіздікке кіреді, сондықтан жауап:
<span class="solution-formula">[6; +∞).</span></li>
</ol>`,

    keyFact:
      "Теңсіздіктің шешімі: [6; +∞)."
  },

  {
    number: 3,

    question:
      "Егер |8x − 4| > 5 және x < 1 болса, x-тің қабылдайтын мәнін табыңыз.",

    options: [
      "0,8",
      "0,5",
      "0",
      "0,4",
      "−0,4"
    ],

    correct: 4,

    explanation:
      `<ol class="solution-steps">
<li><b>1-қадам.</b> Модульді екі жағдайға бөлеміз:
<span class="solution-formula">8x − 4 &gt; 5 немесе 8x − 4 &lt; −5.</span></li>
<li><b>2-қадам.</b> Бірінші жағдай:
<span class="solution-formula">8x &gt; 9 → x &gt; 9/8.</span></li>
<li><b>3-қадам.</b> Екінші жағдай:
<span class="solution-formula">8x &lt; −1 → x &lt; −1/8.</span></li>
<li><b>4-қадам.</b> Қосымша шарт x &lt; 1 болғандықтан, x &gt; 9/8 тармағы жарамайды. Қалады:
<span class="solution-formula">x &lt; −1/8.</span></li>
<li><b>5-қадам.</b> Нұсқаларды тексерсек, тек <b>−0,4</b> саны −1/8-ден кіші.</li>
</ol>`,

    keyFact:
      "Дұрыс мән: x = −0,4."
  },
    {
    number: 4,

    question:
      "Егер b > a және M < a болса, келесі тұжырымдардың арасындағы дұрыс тұжырымды табыңыз.",

    options: [
      "b − M = −1",
      "b − a = −1",
      "a − b = 1",
      "M − a = 1",
      "b − M = 1"
    ],

    correct: 4,

    explanation:
      `<ol class="solution-steps">
<li><b>1-қадам.</b> Берілгендерді бір тізбекке орналастырамыз:
<span class="solution-formula">M &lt; a &lt; b.</span></li>
<li><b>2-қадам.</b> Сондықтан b − M айырмасы міндетті түрде оң болады:
<span class="solution-formula">b − M &gt; 0.</span></li>
<li><b>3-қадам.</b> Нұсқаларды салыстырамыз. A, B, C және D нұсқалары берілген ретке қайшы. Оң айырма көрсетілген жалғыз нұсқа:
<span class="solution-formula">b − M = 1.</span></li>
</ol>`,

    keyFact:
      "M < a < b болғандықтан, b − M > 0."
  },

  {
    number: 5,

    question:
      "Егер m және n оң бүтін сандар үшін 2¹⁸ · 3ᵐ = 12ⁿ теңдігі орындалса, m санының мәнін табыңыз.",

    options: [
      "16",
      "18",
      "4",
      "8",
      "9"
    ],

    correct: 4,

    explanation:
      `<ol class="solution-steps">
<li><b>1-қадам.</b> 12 санын жай көбейткіштерге жіктейміз:
<span class="solution-formula">12 = 2² · 3.</span></li>
<li><b>2-қадам.</b> Оң жақты дәрежеге шығарамыз:
<span class="solution-formula">12ⁿ = (2² · 3)ⁿ = 2²ⁿ · 3ⁿ.</span></li>
<li><b>3-қадам.</b> 2 негізінің дәрежелерін теңестіреміз:

    keyFact:
      "1 — көркем әдебиет, 2 және 3 — публицистикалық."
  },

  {
    number:30,

    question:
      "Үш мәтіннің де мазмұнын ашатын тақырыпты көрсетіңіз.",

    options:[
      "тіл білу",
      "кітап оқу",
      "технология мүмкіндіктері",
      "онлайн-білім порталы",
      "білім алу"
    ],

    correct:4,

    explanation:
      "Барлық мәтіндердің негізгі өзегі – адамның білім алуы. Бірінші мәтінде кітап оқу арқылы, екінші мәтінде жаңа технология арқылы, үшінші мәтінде онлайн оқу арқылы білім алу көрсетілген.",

    keyFact:
      "Үш мәтінді біріктіретін негізгі тақырып — білім алу."
  }

];
  const contextStyle = document.createElement("style");

contextStyle.textContent = `
  .context-card {
    margin: 5px 0 18px;
    padding: 18px;
    border: 1px solid #dce3ee;
    border-radius: 14px;
    background: #f8fafc;
  }

  .context-card h3 {
    margin: 0 0 10px;
    color: var(--primary-dark);
  }

  .context-card h3:not(:first-child) {
    margin-top: 20px;
  }

  .context-card p {
    margin: 0 0 12px;
    text-align: justify;
  }

  .context-card p:last-child {
    margin-bottom: 0;
  }
`;

document.head.appendChild(contextStyle);

function renderQuestion(
  question,
  questionIndex,
  sectionName
) {
  const visualHtml =
    question.visual || "";

  const contextHtml =
    question.context || "";

  const optionsHtml =
    question.options
      .map((option, optionIndex) => {
        return `
          <label
            class="option"
            data-option-index="${optionIndex}"
          >
            <input
              type="radio"
              name="${sectionName}Question${questionIndex}"
              value="${optionIndex}"
            >

            <span class="option-letter">
              ${letters[optionIndex]})
            </span>

            <span>
              ${option}
            </span>
          </label>
        `;
      })
      .join("");

  return `
    <article
      class="question"
      data-question-index="${questionIndex}"
    >
      <div class="question-number">
        ${question.number}-сұрақ
      </div>

      ${contextHtml}

      <h3 class="question-title">
        ${question.question}
      </h3>

      ${visualHtml}

      <div class="options">
        ${optionsHtml}
      </div>

      <div class="explanation">

        <div class="question-score"></div>

        <div class="correct-answer">
          Дұрыс жауап:
          ${letters[question.correct]})
          ${question.options[question.correct]}
        </div>

        <div class="explanation-title">
          Түсіндірме
        </div>

        <p class="explanation-text">
          ${question.explanation}
        </p>

        <div class="key-fact">
          ${question.keyFact}
        </div>

      </div>
    </article>
  `;
}
  function createAnalyticalSection() {
  const analyticalSection =
    document.createElement("section");

  analyticalSection.id =
    "analyticalSection";

  analyticalSection.className =
    "test-section";

  analyticalSection.innerHTML = `
    <div class="section-header">

      <h2>
        Аналитикалық ойлау
      </h2>

      <p>
        15 сұрақ. Әр сұрақта бір дұрыс жауап бар.
        Әр дұрыс жауапқа 1 балл беріледі.
      </p>

      <div class="section-information">

        <span class="information-badge">
          15 сұрақ
        </span>

        <span class="information-badge">
          Ең жоғары балл: 15
        </span>

      </div>

    </div>

    <div class="progress-card">

      <div class="progress-information">

        <span>
          Жауап беру барысы
        </span>

        <strong id="analyticalProgressText">
          0 / 15
        </strong>

      </div>

      <div class="progress-line">
        <span id="analyticalProgressBar"></span>
      </div>

    </div>

    <div
      id="analyticalResult"
      class="result-card"
    >

      <h3>
        Аналитикалық ойлау нәтижесі
      </h3>

      <div
        id="analyticalScore"
        class="score"
      >
        0 / 15
      </div>

    </div>

    <div id="analyticalQuiz"></div>

    <div class="actions">

      <button
        type="button"
        class="reset-button"
        onclick="resetAnalyticalTest()"
      >
        Қайта бастау
      </button>

      <button
        type="button"
        class="show-result-button"
        onclick="showAnalyticalResults()"
      >
        Нәтижені көрсету
      </button>

    </div>
  `;

  const criticalSection =
    document.getElementById(
      "criticalSection"
    );

  criticalSection.insertAdjacentElement(
    "afterend",
    analyticalSection
  );
}
  function renderCriticalQuestions() {
  const quiz =
    document.getElementById(
      "criticalQuiz"
    );

  quiz.innerHTML =
    criticalQuestions
      .map((question, questionIndex) => {
        return renderQuestion(
          question,
          questionIndex,
          "critical"
        );
      })
      .join("");

  quiz
    .querySelectorAll("input")
    .forEach(input => {
      input.addEventListener(
        "change",
        updateCriticalProgress
      );
    });
}

function renderAnalyticalQuestions() {
  const quiz =
    document.getElementById(
      "analyticalQuiz"
    );

  quiz.innerHTML =
    analyticalQuestions
      .map((question, questionIndex) => {
        return renderQuestion(
          question,
          questionIndex,
          "analytical"
        );
      })
      .join("");

  quiz
    .querySelectorAll("input")
    .forEach(input => {
      input.addEventListener(
        "change",
        updateAnalyticalProgress
      );
    });
}

function openSection(sectionName) {
  const criticalSection =
    document.getElementById(
      "criticalSection"
    );

  const analyticalSection =
    document.getElementById(
      "analyticalSection"
    );

  const criticalTab =
    document.getElementById(
      "criticalTab"
    );

  const analyticalTab =
    document.getElementById(
      "analyticalTab"
    );

  criticalSection.classList.remove(
    "active"
  );

  analyticalSection.classList.remove(
    "active"
  );

  criticalTab.classList.remove(
    "active"
  );

  analyticalTab.classList.remove(
    "active"
  );

  if (sectionName === "critical") {
    criticalSection.classList.add(
      "active"
    );

    criticalTab.classList.add(
      "active"
    );
  } else {
    analyticalSection.classList.add(
      "active"
    );

    analyticalTab.classList.add(
      "active"
    );
  }

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

function activateNavigation() {
  const criticalTab =
    document.getElementById(
      "criticalTab"
    );

  const analyticalTab =
    document.getElementById(
      "analyticalTab"
    );

  analyticalTab.disabled = false;

  analyticalTab.classList.remove(
    "locked"
  );

  criticalTab.addEventListener(
    "click",
    () => {
      openSection("critical");
    }
  );

  analyticalTab.addEventListener(
    "click",
    () => {
      openSection("analytical");
    }
  );
}
  function updateCriticalProgress() {

  const total = criticalQuestions.length;

  const answered =
    document.querySelectorAll(
      '#criticalQuiz input:checked'
    ).length;

  document.getElementById(
    "criticalProgressText"
  ).textContent =
    answered + " / " + total;

  document.getElementById(
    "criticalProgressBar"
  ).style.width =
    answered / total * 100 + "%";
}

function updateAnalyticalProgress() {

  const total = analyticalQuestions.length;

  const answered =
    document.querySelectorAll(
      '#analyticalQuiz input:checked'
    ).length;

  document.getElementById(
    "analyticalProgressText"
  ).textContent =
    answered + " / " + total;

  document.getElementById(
    "analyticalProgressBar"
  ).style.width =
    answered / total * 100 + "%";
}

function showResults(
  questions,
  quizId,
  resultId,
  scoreId
){

  let score = 0;

  const quiz =
    document.getElementById(
      quizId
    );

  const cards =
    quiz.querySelectorAll(
      ".question"
    );

  cards.forEach((card,index)=>{

    const correct =
      questions[index].correct;

    const checked =
      card.querySelector(
        "input:checked"
      );

    const explanation =
      card.querySelector(
        ".explanation"
      );

    const scoreBlock =
      card.querySelector(
        ".question-score"
      );

    card.classList.add("checked");

    card.querySelectorAll(".option")
      .forEach((option,i)=>{

        if(i===correct){
          option.classList.add(
            "correct"
          );
        }

        if(
          checked &&
          Number(checked.value)===i &&
          i!==correct
        ){
          option.classList.add(
            "wrong"
          );
        }

      });

    if(
      checked &&
      Number(checked.value)===correct
    ){

      score++;

      scoreBlock.className =
        "question-score full";

      scoreBlock.textContent =
        "✓ Дұрыс жауап";

    }else{

      scoreBlock.className =
        "question-score zero";

      scoreBlock.textContent =
        "✗ Қате жауап";

    }

    explanation.style.display =
      "block";

    card.querySelectorAll("input").forEach(input => {
      input.disabled = true;
    });

  });

  document.getElementById(
    scoreId
  ).textContent =
    score +
    " / " +
    questions.length;

  document.getElementById(
    resultId
  ).classList.add("show");

}

function showCriticalResults(){

  showResults(
    criticalQuestions,
    "criticalQuiz",
    "criticalResult",
    "criticalScore"
  );

}

function showAnalyticalResults(){

  showResults(
    analyticalQuestions,
    "analyticalQuiz",
    "analyticalResult",
    "analyticalScore"
  );

}


function resetSection(
  questions,
  quizId,
  resultId,
  scoreId,
  progressTextId,
  progressBarId
){
  const quiz = document.getElementById(quizId);

  quiz.querySelectorAll("input").forEach(input => {
    input.checked = false;
    input.disabled = false;
  });

  quiz.querySelectorAll(".option").forEach(option => {
    option.classList.remove("correct", "wrong");
  });

  quiz.querySelectorAll(".question").forEach(card => {
    card.classList.remove("checked");

    const explanation = card.querySelector(".explanation");
    const scoreBlock = card.querySelector(".question-score");

    if (explanation) {
      explanation.style.display = "";
    }

    if (scoreBlock) {
      scoreBlock.className = "question-score";
      scoreBlock.textContent = "";
    }
  });

  document.getElementById(resultId).classList.remove("show");
  document.getElementById(scoreId).textContent =
    "0 / " + questions.length;
  document.getElementById(progressTextId).textContent =
    "0 / " + questions.length;
  document.getElementById(progressBarId).style.width = "0%";

  window.scrollTo({
    top: 0,
    behavior: "smooth"
  });
}

function resetCriticalTest(){
  resetSection(
    criticalQuestions,
    "criticalQuiz",
    "criticalResult",
    "criticalScore",
    "criticalProgressText",
    "criticalProgressBar"
  );
}

function resetAnalyticalTest(){
  resetSection(
    analyticalQuestions,
    "analyticalQuiz",
    "analyticalResult",
    "analyticalScore",
    "analyticalProgressText",
    "analyticalProgressBar"
  );
}

createAnalyticalSection();

renderCriticalQuestions();

renderAnalyticalQuestions();

activateNavigation();

updateCriticalProgress();

updateAnalyticalProgress();

</script>

</body>
</html>
